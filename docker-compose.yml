version: '3.8'

services:

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: dinetrack_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
            - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
        networks:
            - dinetrack

    nginx:
        image: nginx:alpine
        container_name: dinetrack_nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - .:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - dinetrack

    db:
        image: mysql:8.0
        container_name: dinetrack_db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: dinetrack
            MYSQL_ROOT_PASSWORD: secret
            MYSQL_PASSWORD: secret
            MYSQL_USER: dinetrack
        volumes:
            - dbdata:/var/lib/mysql
        ports:
            - "3307:3306"
        networks:
            - dinetrack

networks:
    dinetrack:
        driver: bridge

volumes:
    dbdata:
        driver: local
